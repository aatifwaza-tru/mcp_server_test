name: CD

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Deploy on WP Engine
        env:
          WP_ENGINE: ${{ secrets.WP_ENGINE }}
          DEV: ${{ secrets.WPE_DEV_ENV_NAME }}
          REPO_NAME: ${{ github.repository }}
          BRANCH_BASE: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |

          # Determine branch
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          cd $GITHUB_WORKSPACE
          git checkout $BRANCH_NAME

          # Set deployment target
          if [ "$BRANCH_NAME" == "dev" ]; then
            DEPLOY=${DEV}
          else
            echo "Unknown branch: $BRANCH_NAME"
            exit 1
          fi

          # Setup SSH
          mkdir -p ~/.ssh
          echo "$WP_ENGINE" | base64 --decode > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa
          ssh-keyscan -H -p 22 git.wpengine.com >> ~/.ssh/known_hosts

          # Fetch full history if shallow
          git fetch --unshallow || true

          # Add remote and push
          git remote remove production || true
          git remote add production git@git.wpengine.com:production/${DEPLOY}.git
          git push -f production $BRANCH_NAME
